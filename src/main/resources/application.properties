spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/school_erp_local}

spring.application.name=SchoolERP
server.port=${PORT:8080}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:local-user}
spring.mail.password=${MAIL_PASSWORD:local-pass}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration
schoolerp.jwt.secret=${JWT_SECRET:local-secret-do-not-use-in-production-123456789}
schoolerp.jwt.expirationMs=${JWT_EXPIRATION:86400000}
